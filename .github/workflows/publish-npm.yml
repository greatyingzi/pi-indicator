name: Publish to npm

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
      - "[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Verify tag matches package version
        if: github.event_name == 'push'
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if ! echo "$TAG_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "Tag must be a semver version, optionally prefixed with v. Got: $GITHUB_REF_NAME"
            exit 1
          fi

          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)."
            exit 1
          fi

      - name: Verify package manifest
        run: npm pkg get name version pi.extensions

      - name: Verify npm package contents
        run: |
          npm pack --dry-run --json --silent > pack.json
          node - <<'NODE'
          const fs = require('node:fs');
          const pack = JSON.parse(fs.readFileSync('pack.json', 'utf8'))[0];
          const files = new Set(pack.files.map((file) => file.path));
          const required = [
            'pi-runcat.ts',
            'runcat.gif',
            'runcat.ttf',
            'package.json',
            'README.md'
          ];
          const missing = required.filter((file) => !files.has(file));
          if (missing.length > 0) {
            console.error(`Missing required package files: ${missing.join(', ')}`);
            process.exit(1);
          }
          NODE

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
